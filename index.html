<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegitDoc EU | European Services</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --primary: #0a1f44; /* deep EU navy */
    --accent: #c9a227; /* gold */
    --bg: #f5f7fa;
    --white: #ffffff;
}

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: #222;
}

/* HEADER */
header {
    background: var(--white);
    padding: 15px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* HERO */
.hero {
    background: linear-gradient(rgba(10,31,68,0.9), rgba(10,31,68,0.9)),
                url('https://images.unsplash.com/photo-1526779259212-939e64788e3c?auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    text-align: center;
    padding: 120px 20px;
    color: white;
    position: relative;
}

/* subtle EU stars pattern */
.hero::after {
    content: "★ ★ ★ ★ ★ ★ ★ ★ ★ ★ ★ ★";
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.15);
    font-size: 18px;
    letter-spacing: 10px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    margin-bottom: 10px;
}

.hero p {
    color: var(--accent);
    letter-spacing: 1px;
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 1200px;
    margin: 60px auto;
}

/* GRID */
.country-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

/* CARD */
.country-card {
    background: var(--white);
    border-radius: 10px;
    padding: 25px;
    transition: 0.4s;
    border-top: 4px solid transparent;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.country-card:hover {
    transform: translateY(-8px);
    border-top: 4px solid var(--accent);
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

/* FLAG HEADER */
.flag-header {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
}

.flag-icon {
    font-size: 2rem;
    margin-right: 12px;
}

.flag-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
}

/* SERVICES */
.service-list {
    list-style: none;
    margin-top: 10px;
}

.service-list li {
    padding: 8px 0;
    display: flex;
    align-items: center;
    font-size: 0.95rem;
}

.service-list i {
    color: var(--accent);
    margin-right: 10px;
}

/* BUTTON */
.cta-button {
    display: block;
    text-align: center;
    background: var(--primary);
    color: white;
    padding: 12px;
    margin-top: 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.cta-button:hover {
    background: var(--accent);
    color: var(--primary);
}

/* FOOTER */
footer {
    background: var(--primary);
    color: white;
    padding: 40px;
    text-align: center;
}

/* WHATSAPP FLOAT */
.whatsapp-float {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #25d366;
    color: white;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    text-decoration: none;
}

/* RESPONSIVE */
@media(max-width:600px){
    .hero h1 { font-size: 2rem; }
}
</style>
</head>

<body>

<header>
    <h2 style="color: var(--primary); font-family: 'Playfair Display', serif;">
        LegitDoc <span style="color: var(--accent)">EU</span>
    </h2>
</header>

<section class="hero">
    <h1>European Premium Services</h1>
    <p>Precision • Confidentiality • Excellence</p>
</section>

<div class="container">
<div class="country-grid">

<!-- Keep your existing country cards EXACTLY as they are -->
<!-- (no change needed below this line unless you want more countries) -->

<div class="country-card">
    <div class="flag-header"><span class="flag-icon">🇪🇸</span> <h2>España</h2></div>
    <ul class="service-list">
        <li><i class="fas fa-id-card"></i> Documento Nacional de Identidad</li>
        <li><i class="fas fa-car"></i> Permiso de Conducir</li>
        <li><i class="fas fa-home"></i> Permiso de Residencia</li>
        <li><i class="fas fa-passport"></i> Pasaporte</li>
    </ul>
    <a href="https://wa.me/12268696030" class="cta-button">Contactar Ahora</a>
</div>

<!-- (rest of your cards unchanged) -->

</div>
</div>

<footer>
    <p>© 2026 LegitDoc EU • European Standard Services</p>
</footer>

<a href="https://wa.me/12268696030" class="whatsapp-float">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
